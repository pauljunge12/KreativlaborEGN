<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreativlabor EGN – Master System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg:#f4f3f0; --accent:#1d4ed8; --success:#15803d; --purple:#7c3aed; --border:#e2e0db; }
        body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; }
        .card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .input-box { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="auth-screen" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="card max-w-sm w-full text-center">
            <h1 class="text-2xl font-bold mb-6">Kreativlabor Login</h1>
            <input type="text" id="name-in" class="input-box" placeholder="Dein Name">
            <input type="email" id="email-in" class="input-box" placeholder="Deine E-Mail">
            <button onclick="performLogin()" class="w-full bg-black text-white py-3 rounded-lg font-bold">Starten</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900">Kreativlabor EGN</h1>
                <p id="user-display" class="text-gray-500 font-medium"></p>
            </div>
            <div class="flex items-center gap-4">
                <div id="points-display" class="bg-orange-100 text-orange-700 px-5 py-2 rounded-full font-bold">⭐ 0 Punkte</div>
                <button onclick="toggleAdmin()" class="text-gray-400 hover:text-black">Admin</button>
            </div>
        </header>

        <div class="flex gap-4 mb-8">
            <button onclick="setTab('auftrag')" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">Auftrag & Idee</button>
            <button onclick="setTab('db')" class="px-6 py-3 bg-purple-600 text-white rounded-xl font-bold hover:bg-purple-700 transition">Modell-Datenbank</button>
        </div>

        <div id="section-auftrag" class="grid md:grid-cols-2 gap-8">
            <div class="card">
                <h2 class="text-xl font-bold mb-6">Neuer Druck / Projekt</h2>
                <select id="mode-select" onchange="renderForm()" class="input-box border-blue-200">
                    <option value="idee">💡 Idee / Skizze / Reparatur</option>
                    <option value="stl">📐 STL-Druckauftrag</option>
                </select>
                <div id="dynamic-form"></div>
            </div>
            <div class="space-y-6">
                <div id="admin-card" class="card border-red-200 hidden">
                    <h2 class="text-red-600 font-bold mb-4">Admin-Panel</h2>
                    <div id="admin-list" class="text-sm"></div>
                </div>
            </div>
        </div>

        <div id="section-db" class="hidden card">
            <h2 class="text-xl font-bold mb-6">Modell-Datenbank</h2>
            <div id="db-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </div>
    </div>

    <script>
        let state = { name: '', points: 0, isAdmin: false, orders: [] };

        function performLogin() {
            state.name = document.getElementById('name-in').value;
            if(!state.name) return;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('user-display').innerText = `Willkommen, ${state.name}`;
        }

        function renderForm() {
            const mode = document.getElementById('mode-select').value;
            const container = document.getElementById('dynamic-form');
            if(mode === 'idee') {
                container.innerHTML = `
                    <textarea class="input-box" rows="4" placeholder="Beschreibe dein Projekt / Skizze..."></textarea>
                    <input type="file" class="input-box">
                    <button onclick="addPoints(15)" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Idee einreichen (+15 Pkt)</button>
                `;
            } else {
                container.innerHTML = `
                    <input type="file" class="input-box">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" class="input-box" placeholder="Stückzahl">
                        <select class="input-box"><option>15% Infill</option><option>20% Infill</option><option>40% Infill</option></select>
                    </div>
                    <select class="input-box"><option>PLA Schwarz</option><option>PLA Weiß</option><option>PETG</option></select>
                    <button onclick="addPoints(25)" class="w-full bg-green-700 text-white py-3 rounded-lg font-bold">Druck kalkulieren (+25 Pkt)</button>
                `;
            }
        }

        function addPoints(p) {
            state.points += p;
            document.getElementById('points-display').innerText = `⭐ ${state.points} Punkte`;
            alert("Erfolgreich! Punkte wurden hinzugefügt.");
        }

        function setTab(tab) {
            document.getElementById('section-auftrag').classList.toggle('hidden', tab !== 'auftrag');
            document.getElementById('section-db').classList.toggle('hidden', tab !== 'db');
        }

        function toggleAdmin() {
            const pw = prompt("Admin Passwort:");
            if(pw === "admin123") {
                state.isAdmin = !state.isAdmin;
                document.getElementById('admin-card').classList.toggle('hidden', !state.isAdmin);
            }
        }

        renderForm(); // Init
    </script>
</body>
</html>
