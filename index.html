<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kreativlabor EGN</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f3f4f6;
color:#111;
}

header{
background:white;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #ddd;
position:sticky;
top:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
border:1px solid #ddd;
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:12px;
margin:8px 0 14px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

button{
padding:12px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.btn{background:#2563eb;color:white}
.btn2{background:#eee}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.badge{
padding:6px 10px;
border-radius:999px;
font-size:12px;
background:#e5e7eb;
display:inline-block;
}

.hidden{display:none}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" style="position:fixed;inset:0;background:#fff;display:flex;justify-content:center;align-items:center;z-index:9999;">
<div class="card" style="width:380px">
<h2 style="margin-top:0">Kreativlabor EGN</h2>
<p>Bitte anmelden</p>

<input id="loginName" placeholder="Name">
<input id="loginEmail" placeholder="E-Mail">

<button class="btn" onclick="login()">Starten</button>
</div>
</div>

<!-- HEADER -->
<header>
<div><b>Kreativlabor EGN</b></div>

<div>
⭐ <span id="points">0</span> Punkte
</div>
</header>

<div class="container">

<!-- NAV -->
<div class="tabs">
<button class="btn2" onclick="show('idea')">Idee</button>
<button class="btn2" onclick="show('stl')">STL Druck</button>
<button class="btn2" onclick="show('db')">Datenbank</button>
<button class="btn2 hidden" id="adminTab" onclick="show('admin')">Admin</button>
</div>

<!-- IDEE -->
<div id="idea">
<div class="card">
<h3>Idee / Reparatur</h3>

<input id="i_name" placeholder="Name">
<input id="i_class" placeholder="Klasse">
<input id="i_email" placeholder="E-Mail">

<input id="i_build" placeholder="Build / Skizze (optional)">
<textarea id="i_desc" placeholder="Beschreibung"></textarea>

<button class="btn" onclick="sendIdea()">Senden</button>
</div>
</div>

<!-- STL -->
<div id="stl" class="hidden">
<div class="card">
<h3>STL Auftrag</h3>

<input id="s_name" placeholder="Name">
<input id="s_class" placeholder="Klasse">

<select id="pointsMode">
<option value="none">Keine Punkte</option>
<option value="discount">10% Rabatt (50 Punkte)</option>
<option value="free">Freidruck (250 Punkte)</option>
</select>

<input type="file" id="file">
<textarea id="s_desc"></textarea>

<div class="card">
Preis: <b id="price">10 €</b>
</div>

<button class="btn" onclick="sendStl()">Bestellen</button>
</div>
</div>

<!-- DB -->
<div id="db" class="hidden">
<div class="card">
<h3>Modell Datenbank</h3>

<input id="db_title" placeholder="Titel">
<textarea id="db_desc"></textarea>

<button class="btn" onclick="uploadModel()">Upload</button>
</div>

<div id="db_list"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">
<div class="card">
<h3>Admin Dashboard</h3>
<div id="admin_list"></div>
</div>
</div>

</div>

<script>

let orders=[];
let models=[];
let points=0;
let user={};

const ADMIN_PASSWORD="kreativlabor2026";

function login(){
user.name=document.getElementById('loginName').value;
user.email=document.getElementById('loginEmail').value;

if(!user.name||!user.email)return;

document.getElementById('loginScreen').style.display='none';
}

function show(tab){
["idea","stl","db","admin"].forEach(id=>{
document.getElementById(id).classList.add("hidden");
});

document.getElementById(tab).classList.remove("hidden");

if(tab==="admin")renderAdmin();
}

function updatePoints(){
document.getElementById("points").innerText=points;
}

function save(){
localStorage.setItem("orders",JSON.stringify(orders));
localStorage.setItem("models",JSON.stringify(models));
localStorage.setItem("points",points);
}

function load(){
orders=JSON.parse(localStorage.getItem("orders")||"[]");
models=JSON.parse(localStorage.getItem("models")||"[]");
points=parseInt(localStorage.getItem("points")||0);

updatePoints();
renderModels();
}

load();

/* ---------- IDEE ---------- */
function sendIdea(){

orders.unshift({
type:"Idee",
desc:document.getElementById("i_desc").value,
status:"offen"
});

save();
alert("Gesendet");
}

/* ---------- STL ---------- */
function sendStl(){

let price=10;

let mode=document.getElementById("pointsMode").value;

// Rabatt
if(mode==="discount" && points>=50){
points-=50;
price=Math.round(price*0.9);
}

// Freidruck
if(mode==="free" && points>=250){
points-=250;
price=0;
}

// KEIN MINUS
if(points<0)points=0;

// Belohnung
points+=10;

orders.unshift({
type:"STL",
desc:document.getElementById("s_desc").value,
status:"offen",
price:Math.round(price)
});

save();
updatePoints();

alert("Bestellt");
}

/* ---------- DB ---------- */
function uploadModel(){

models.unshift({
title:document.getElementById("db_title").value,
desc:document.getElementById("db_desc").value
});

points+=25;

save();
updatePoints();
renderModels();

alert("Upload fertig");
}

function renderModels(){

document.getElementById("db_list").innerHTML=

models.map(m=>`
<div class="card">
<b>${m.title}</b>
<p>${m.desc}</p>
</div>
`).join('');
}

/* ---------- ADMIN ---------- */
function adminLogin(){

let pw=prompt("Admin Passwort");

if(pw===ADMIN_PASSWORD){

document.getElementById("adminTab").classList.remove("hidden");

show("admin");

renderAdmin();

}else{
alert("Falsch");
}
}

function renderAdmin(){

document.getElementById("admin_list").innerHTML=

orders.map((o,i)=>`
<div class="card">
<b>${o.type}</b>
<p>${o.desc}</p>
<span class="badge">${o.status}</span>

<br><br>

<button class="btn" onclick="finish(${i})">Fertig</button>
</div>
`).join('');
}

function finish(i){
orders.splice(i,1);
save();
renderAdmin();
}

</script>

</body>
</html>
