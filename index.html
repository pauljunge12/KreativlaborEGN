<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kreativlabor EGN</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f3f4f6;
color:#111;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 24px;
background:#fff;
border-bottom:1px solid #ddd;
position:sticky;
top:0;
}

.container{padding:24px;max-width:1100px;margin:auto}

.card{
background:#fff;
border:1px solid #ddd;
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.btn{background:#2563eb;color:#fff}
.btn2{background:#eee}

.tabs button{
margin-right:10px;
padding:10px 14px;
border-radius:10px;
border:none;
cursor:pointer;
}

.active{background:#2563eb;color:#fff}

.hidden{display:none}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

@media(max-width:700px){.grid{grid-template-columns:1fr}}

.login{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#f3f4f6;
}

.login-box{
background:#fff;
padding:30px;
border-radius:20px;
width:90%;
max-width:420px;
border:1px solid #ddd;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
<div class="login-box">
<h2>Kreativlabor EGN Login</h2>
<input id="name" placeholder="Name">
<input id="mail" placeholder="E-Mail">
<button class="btn" onclick="login()">Starten</button>
</div>
</div>

<header>
<div><b>Kreativlabor EGN</b></div>
<div>
⭐ Punkte: <span id="points">0</span>
<button class="btn2" onclick="adminLogin()">Admin</button>
</div>
</header>

<div class="container hidden" id="app">

<!-- NAV -->
<div class="tabs">
<button class="active" onclick="tab('order')">Aufträge</button>
<button onclick="tab('db')">Datenbank</button>
<button id="adminTab" class="hidden" onclick="tab('admin')">Admin</button>
</div>

<!-- ORDER -->
<div id="order">

<div class="card">
<h3>Idee / Reparatur</h3>

<input id="idea_name" placeholder="Name">
<input id="idea_class" placeholder="Klasse">
<input type="file" id="idea_sketch">
<textarea id="idea_desc" placeholder="Beschreibung"></textarea>

<button class="btn" onclick="sendIdea()">Senden</button>
</div>

<div class="card">
<h3>STL Druck</h3>

<input id="stl_name" placeholder="Name">
<input id="stl_class" placeholder="Klasse">

<select id="points_use">
<option value="none">Keine Punkte</option>
<option value="discount">10% Rabatt (50 Punkte)</option>
<option value="free">Gratis Druck (250 Punkte)</option>
</select>

<input type="file" id="stl_file">
<textarea id="stl_desc"></textarea>

<button class="btn" onclick="sendStl()">Bestellen</button>
</div>

<div class="card">
<h3>Meine Aufträge</h3>
<div id="orders"></div>
</div>

</div>

<!-- DB -->
<div id="db" class="hidden">

<div class="card">
<h3>Modell hochladen</h3>

<input id="db_title" placeholder="Titel">
<select id="db_cat">
<option>Allgemein</option>
<option>Schule</option>
<option>Repair</option>
</select>

<textarea id="db_desc"></textarea>
<input type="file" id="db_file">

<button class="btn" onclick="uploadModel()">Upload</button>
</div>

<div class="card">
<h3>Modelle</h3>
<div id="models"></div>
</div>

</div>

<!-- ADMIN -->
<div id="admin" class="hidden">

<div class="card">
<h3>Admin Dashboard</h3>
<div id="admin_orders"></div>
</div>

</div>

</div>

<script>

let logged=false;
let admin=false;

let orders=[];
let models=[];
let points=0;

/* LOGIN */
function login(){
let n=name.value;
let m=mail.value;
if(!n||!m)return alert("Fehler");
localStorage.user=n;
document.getElementById("login").style.display="none";
document.getElementById("app").classList.remove("hidden");
load();
}

/* TAB */
function tab(t){
order.classList.add("hidden");
db.classList.add("hidden");
admin.classList.add("hidden");

if(t==="order")order.classList.remove("hidden");
if(t==="db")db.classList.remove("hidden");
if(t==="admin")admin.classList.remove("hidden");
}

/* DATA */
function save(){
localStorage.orders=JSON.stringify(orders);
localStorage.models=JSON.stringify(models);
localStorage.points=points;
}

function load(){
orders=JSON.parse(localStorage.orders||"[]");
models=JSON.parse(localStorage.models||"[]");
points=parseInt(localStorage.points||"0");
render();
}

/* POINTS SAFE */
function addPoints(v){
points=Math.max(0,points+v);
save();
render();
}

/* IDEE */
function sendIdea(){
orders.unshift({
type:"Idee",
name:idea_name.value,
desc:idea_desc.value,
status:"Neu"
});
save();render();
}

/* STL */
function sendStl(){

let price=5;

let mode=points_use.value;

if(mode==="discount"&&points>=50){
points-=50;
price*=0.9;
}

if(mode==="free"){
if(points<250)return alert("Zu wenig Punkte");
points-=250;
price=0;
}

orders.unshift({
type:"STL",
name:stl_name.value,
desc:stl_desc.value,
price:price,
status:"Neu"
});

addPoints(20);
save();
render();
}

/* MODELS */
function uploadModel(){
models.unshift({
title:db_title.value,
desc:db_desc.value
});
addPoints(40);
save();
render();
}

/* ADMIN LOGIN */
function adminLogin(){
let pw=prompt("Admin Passwort");
if(pw==="kreativlabor2026"){
admin=true;
document.getElementById("adminTab").classList.remove("hidden");
alert("Admin OK");
}
}

/* STATUS */
function setStatus(i,s){
orders[i].status=s;
save();
render();
}

/* DELETE */
function del(i){
orders.splice(i,1);
save();
render();
}

/* RENDER */
function render(){

pointsEl.textContent=points;

ordersEl.innerHTML=orders.map((o,i)=>`
<div class="card">
<b>${o.type}</b> - ${o.status}
<p>${o.desc||""}</p>
${o.price?o.price.toFixed(2)+" €":""}
<button onclick="setStatus(${i},'Drucken')">Drucken</button>
<button onclick="setStatus(${i},'Fertig')">Fertig</button>
<button onclick="del(${i})">Entfernen</button>
</div>
`).join("");

modelsEl.innerHTML=models.map(m=>`
<div class="card">
<b>${m.title}</b>
<p>${m.desc}</p>
</div>
`).join("");

admin_orders.innerHTML=orders.map((o,i)=>`
<div class="card">
<b>${o.type}</b>
<p>${o.status}</p>
<button onclick="setStatus(${i},'Drucken')">Drucken</button>
<button onclick="setStatus(${i},'Fertig')">Fertig</button>
</div>
`).join("");
}

</script>

</body>
</html>
