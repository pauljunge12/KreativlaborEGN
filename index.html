<!-- =========================================================
5. SWITCH MAIN TAB ERSETZEN
DEINE ALTE FUNKTION KOMPLETT ERSETZEN
========================================================= -->

<script>

function switchMainTab(tab){

document.getElementById(
'section-order'
).style.display =
tab === 'order'
? 'block'
: 'none';

document.getElementById(
'section-db'
).style.display =
tab === 'db'
? 'block'
: 'none';

document.getElementById(
'section-admin-orders'
).style.display =
tab === 'admin-orders'
? 'block'
: 'none';

document.getElementById(
'main-tab-order'
).classList.toggle(
'active',
tab === 'order'
);

document.getElementById(
'main-tab-db'
).classList.toggle(
'active',
tab === 'db'
);

if(document.getElementById('admin-orders-tab')){

document.getElementById(
'admin-orders-tab'
).classList.toggle(
'active',
tab === 'admin-orders'
);
}

if(tab === 'admin-orders'){

renderAdminOrders();
}
}

</script>

<script>

function openAdminLogin(){

const p = prompt(
'Admin Passwort eingeben'
);

if(p === ADMIN_PASSWORD){

isAdmin = true;

document.getElementById(
'admin-orders-tab'
).style.display='inline-flex';

showToast(
'Admin Modus aktiviert'
);

renderAdminOrders();

}else if(p !== null){

alert('Falsches Passwort!');
}
}

</script>

<!-- =========================================================
9. ADMIN AUFTRÄGE RENDERN
GANZ UNTEN IM SCRIPT EINFÜGEN
========================================================= -->

<script>

function renderAdminOrders(){

const list =
document.getElementById(
'admin-orders-list'
);

const orders = getOrders();

document.getElementById(
'open-orders-count'
).textContent =
orders.length;

if(orders.length === 0){

list.innerHTML = `
<div style="
color:#6b7280;
padding:24px;
text-align:center;
">

Keine Aufträge vorhanden.

</div>
`;

return;
}

list.innerHTML =
orders.map(o => `

<div style="
border:1px solid #e5e7eb;
border-radius:18px;
padding:20px;
margin-bottom:18px;
background:white;
">

<div style="
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:14px;
gap:12px;
flex-wrap:wrap;
">

<div>

<div style="
font-weight:700;
font-size:1rem;
margin-bottom:6px;
">

${o.id}

</div>

<div style="
font-size:.85rem;
color:#6b7280;
line-height:1.5;
white-space:pre-wrap;
">

${o.desc}

</div>

</div>

<div class="
status-badge
${getStatusClass(o.status)}
">

${o.status || 'Eingegangen'}

</div>

</div>

<div style="
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:18px;
">

<button
class="btn-secondary"
onclick="
updateOrderStatus(
'${o.id}',
'Heruntergeladen'
)
">

⬇ Heruntergeladen

</button>

<button
class="btn-secondary"
onclick="
updateOrderStatus(
'${o.id}',
'Am Drucken'
)
">

🖨 Am Drucken

</button>

<button
class="btn-secondary"
onclick="
updateOrderStatus(
'${o.id}',
'Fertig'
)
">

✅ Fertig

</button>

<button
class="btn-primary"
style="background:#16a34a;"
onclick="
finishOrder(
'${o.id}'
)
">

✔ Abgeholt

</button>

</div>

</div>

`).join('');
}

function getStatusClass(status){

if(status === 'Eingegangen')
return 'status-open';

if(status === 'Heruntergeladen')
return 'status-download';

if(status === 'Am Drucken')
return 'status-print';

if(status === 'Fertig')
return 'status-finished';

return 'status-open';
}

function updateOrderStatus(id,status){

const orders = getOrders();

const order =
orders.find(o => o.id === id);

if(order){

order.status = status;

saveOrders(orders);

renderOrders();

renderAdminOrders();
}
}

function finishOrder(id){

let orders = getOrders();

orders =
orders.filter(
o => o.id !== id
);

saveOrders(orders);

renderOrders();

renderAdminOrders();

showToast(
'Auftrag abgeschlossen'
);
}

</script>
