<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Kreativlabor EGN – Auftragsverwaltung</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg:#f4f3f0; --surface:#fff; --accent:#1d4ed8; --text:#1a1916; --muted:#6b6860; --warn:#c2410c; }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); }
    .card { background: white; border: 1px solid #e2e0db; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .input-group { margin-bottom: 15px; }
    label { display: block; font-size: 0.75rem; font-weight: bold; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #e2e0db; border-radius: 6px; }
    button { cursor: pointer; }
  </style>
</head>
<body class="p-4 md:p-8">

  <div id="login-overlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center p-4">
    <div class="card max-w-sm w-full text-center">
      <h2 class="text-xl font-bold mb-4">Kreativlabor Anmeldung</h2>
      <div class="text-left mb-4">
        <label>Name</label>
        <input type="text" id="login-name" placeholder="Vorname Nachname">
        <label class="mt-3">E-Mail</label>
        <input type="email" id="login-email" placeholder="name@schule.de">
      </div>
      <button onclick="login()" class="bg-black text-white w-full py-2 rounded">Anmelden</button>
    </div>
  </div>

  <div class="max-w-5xl mx-auto">
    <header class="flex justify-between items-center mb-8">
      <h1 class="text-2xl font-bold">Kreativlabor EGN</h1>
      <button onclick="adminLogin()" class="text-sm text-gray-500 border px-3 py-1 rounded">Admin-Login</button>
    </header>

    <div class="grid md:grid-cols-2 gap-8">
      
      <div class="space-y-6">
        <div class="card">
          <h2 class="font-bold mb-4">Neuen Auftrag erstellen</h2>
          <select id="auftrag-typ" onchange="toggleForm()" class="mb-4">
            <option value="idee">Projekt-Idee mit Skizze</option>
            <option value="stl">Fertige STL drucken</option>
          </select>

          <div id="form-idee">
            <label>Projektname & Beschreibung</label>
            <textarea id="idee-desc" rows="3" class="mb-3"></textarea>
            <label>Skizze / Bild (Upload)</label>
            <input type="file" id="idee-img" accept="image/*" class="mb-3">
            <button onclick="submitAuftrag('Idee')" class="bg-blue-600 text-white w-full py-2 rounded">Auftrag senden</button>
          </div>

          <div id="form-stl" class="hidden">
            <label>STL Datei</label>
            <input type="file" id="stl-file" accept=".stl" class="mb-3">
            <div class="grid grid-cols-2 gap-2 mb-3">
              <div><label>Stückzahl</label><input type="number" id="stl-count" value="1"></div>
              <div><label>Füllung (%)</label><input type="number" id="stl-fill" value="20"></div>
            </div>
            <label>Farbe</label>
            <select id="stl-color" class="mb-3"><option>Schwarz</option><option>Weiß</option><option>Blau</option></select>
            <button onclick="submitAuftrag('STL')" class="bg-blue-600 text-white w-full py-2 rounded">Druckauftrag senden</button>
          </div>
        </div>

        <div id="admin-area" class="card border-red-500 hidden">
          <h2 class="font-bold text-red-600">Admin: Aufträge</h2>
          <div id="admin-list" class="mt-4 space-y-2"></div>
        </div>
      </div>

      <div class="card">
        <h2 class="font-bold mb-4">Modell-Datenbank (Hochladen)</h2>
        <input type="text" id="db-title" placeholder="Modellname" class="mb-2">
        <input type="file" id="db-file" accept=".stl" class="mb-3">
        <button onclick="saveToDB()" class="bg-purple-600 text-white w-full py-2 rounded">In Datenbank hochladen</button>
        <div id="db-list" class="mt-6 space-y-2"></div>
      </div>

    </div>
  </div>

  <script>
    let user = null;
    let isAdmin = false;

    function login() {
      const name = document.getElementById('login-name').value;
      const email = document.getElementById('login-email').value;
      if(name && email) {
        user = { name, email };
        document.getElementById('login-overlay').style.display = 'none';
      }
    }

    function toggleForm() {
      const val = document.getElementById('auftrag-typ').value;
      document.getElementById('form-idee').classList.toggle('hidden', val !== 'idee');
      document.getElementById('form-stl').classList.toggle('hidden', val !== 'stl');
    }

    function adminLogin() {
      const pw = prompt("Admin Passwort:");
      if(pw === "admin123") {
        isAdmin = true;
        document.getElementById('admin-area').classList.remove('hidden');
        renderOrders();
      }
    }

    function submitAuftrag(typ) {
      const list = JSON.parse(localStorage.getItem('auftraege') || '[]');
      const obj = {
        id: Date.now(),
        typ,
        user: user.name,
        desc: typ === 'Idee' ? document.getElementById('idee-desc').value : 'STL Upload',
        details: typ === 'STL' ? `Stk: ${document.getElementById('stl-count').value}, Füllung: ${document.getElementById('stl-fill').value}%` : 'Bild hochgeladen'
      };
      list.push(obj);
      localStorage.setItem('auftraege', JSON.stringify(list));
      alert("Auftrag übermittelt!");
      if(isAdmin) renderOrders();
    }

    function renderOrders() {
      const list = JSON.parse(localStorage.getItem('auftraege') || '[]');
      document.getElementById('admin-list').innerHTML = list.map(o => `
        <div class="text-sm border-b p-2"><b>${o.user}</b> (${o.typ}): ${o.desc} <br> <span class="text-xs text-gray-500">${o.details}</span></div>
      `).join('');
    }

    function saveToDB() {
      const list = JSON.parse(localStorage.getItem('db') || '[]');
      list.push({ title: document.getElementById('db-title').value });
      localStorage.setItem('db', JSON.stringify(list));
      renderDB();
    }

    function renderDB() {
      const list = JSON.parse(localStorage.getItem('db') || '[]');
      document.getElementById('db-list').innerHTML = list.map(i => `<div class="p-2 border rounded text-sm">${i.title}</div>`).join('');
    }
    
    renderDB();
  </script>
</body>
</html>
