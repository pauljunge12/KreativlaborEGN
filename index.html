<script>

6. AUFTRÄGE MIT STATUS
========================= -->

<script>

function submitStl(){

const orders =
JSON.parse(
localStorage.getItem(ORDER_KEY)
|| '[]'
);

orders.unshift({

id:'O-'+Date.now(),

type:'STL Druck',

status:'Eingegangen',

weight:currentWeight,

price:currentPrice,

createdAt:Date.now()

});

localStorage.setItem(
ORDER_KEY,
JSON.stringify(orders)
);

addPoints(
Math.min(currentWeight,80)
);

renderOrders();

updatePoints();

document.getElementById(
'stl-success'
).style.display='block';
}

</script>

<!-- =========================
7. USER AUFTRÄGE MIT STATUS
========================= -->

<script>

function renderOrders(){

const orders =
JSON.parse(
localStorage.getItem(ORDER_KEY)
|| '[]'
);

const list =
document.getElementById(
'orders-list'
);

if(orders.length===0){

list.innerHTML='Keine Aufträge.';
return;
}

list.innerHTML =
orders.map(o=>`

<div class="order">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
">

<div style="
font-weight:700;
font-size:1rem;
">

${o.type}

</div>

<div class="
status-badge
${getStatusClass(o.status)}
">

${o.status}

</div>

</div>

<div style="
margin-bottom:10px;
color:#6b7280;
">

${o.weight || 0}g

</div>

<div style="
font-size:1.1rem;
font-weight:700;
color:#2563eb;
">

${o.price ?
o.price.toFixed(2)+' €'
:
''}

</div>

</div>

`).join('');
}

function getStatusClass(status){

if(status==='Eingegangen')
return 'status-open';

if(status==='Heruntergeladen')
return 'status-download';

if(status==='Am Drucken')
return 'status-print';

if(status==='Fertig')
return 'status-finished';

if(status==='Abgeholt')
return 'status-done';

return 'status-open';
}

</script>

<!-- =========================
9. ADMIN AUFTRÄGE RENDERN
========================= -->

<script>

function renderAdminOrders(){

const orders =
JSON.parse(
localStorage.getItem(ORDER_KEY)
|| '[]'
);

const wrap =
document.getElementById(
'admin-orders-list'
);

document.getElementById(
'admin-open-count'
).innerText =
orders.filter(
o=>o.status==='Eingegangen'
).length;

document.getElementById(
'admin-printing-count'
).innerText =
orders.filter(
o=>o.status==='Am Drucken'
).length;

document.getElementById(
'admin-finished-count'
).innerText =
orders.filter(
o=>o.status==='Fertig'
).length;

if(orders.length===0){

wrap.innerHTML='Keine Aufträge.';
return;
}

wrap.innerHTML =
orders.map(o=>`

<div class="admin-order">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
">

<div>

<div style="
font-weight:700;
font-size:1.05rem;
">

${o.type}

</div>

<div style="
font-size:.85rem;
color:#6b7280;
">

${o.weight || 0}g

</div>

</div>

<div class="
status-badge
${getStatusClass(o.status)}
">

${o.status}

</div>

</div>

<div style="
display:flex;
gap:10px;
flex-wrap:wrap;
">

<button class="btn"
style="height:44px;"
onclick="
updateOrderStatus(
'${o.id}',
'Heruntergeladen'
)
">

Heruntergeladen

</button>

<button class="btn"
style="height:44px;"
onclick="
updateOrderStatus(
'${o.id}',
'Am Drucken'
)
">

Am Drucken

</button>

<button class="btn"
style="height:44px;"
onclick="
updateOrderStatus(
'${o.id}',
'Fertig'
)
">

Fertig

</button>

<button class="btn"
style="
height:44px;
background:#16a34a;
"
onclick="
finishOrder(
'${o.id}'
)
">

Abgeholt

</button>

</div>

</div>

`).join('');
}

function updateOrderStatus(id,status){

const orders =
JSON.parse(
localStorage.getItem(ORDER_KEY)
|| '[]'
);

const order =
orders.find(o=>o.id===id);

if(order){

order.status=status;

localStorage.setItem(
ORDER_KEY,
JSON.stringify(orders)
);

renderOrders();

renderAdminOrders();
}
}

function finishOrder(id){

let orders =
JSON.parse(
localStorage.getItem(ORDER_KEY)
|| '[]'
);

orders =
orders.filter(
o=>o.id!==id
);

localStorage.setItem(
ORDER_KEY,
JSON.stringify(orders)
);

renderOrders();

renderAdminOrders();
}

</script>
