<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kreativlabor EGN</title>

<style>
:root{
--bg:#f3f4f6;
--card:#ffffff;
--border:#e5e7eb;
--text:#111827;
--muted:#6b7280;
--accent:#2563eb;
--danger:#dc2626;
--ok:#16a34a;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial;}

body{background:var(--bg);color:var(--text);}

header{
position:sticky;top:0;
background:white;
padding:14px 20px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
z-index:50;
}

.container{max-width:1200px;margin:auto;padding:20px;}

.card{
background:white;
border:1px solid var(--border);
border-radius:18px;
padding:20px;
margin-bottom:20px;
}

.btn{
padding:10px 14px;
border-radius:12px;
border:none;
cursor:pointer;
font-weight:700;
}

.btn-primary{background:var(--accent);color:white;}
.btn-secondary{background:#eee;}

input,select,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
margin-top:6px;
}

label{font-size:13px;font-weight:700;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;}

@media(max-width:800px){.grid{grid-template-columns:1fr;}}

.hidden{display:none;}

.status{
padding:4px 10px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.s1{background:#dbeafe;color:#1d4ed8;}
.s2{background:#fef3c7;color:#92400e;}
.s3{background:#ede9fe;color:#6d28d9;}
.s4{background:#dcfce7;color:#166534;}

.login{
position:fixed;inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#f3f4f6;
z-index:999;
}

.login-box{
background:white;
padding:30px;
border-radius:20px;
width:90%;
max-width:420px;
border:1px solid var(--border);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
<div class="login-box">
<h2>Kreativlabor EGN</h2>
<p style="color:var(--muted);margin-bottom:15px;">Login mit Schul-E-Mail</p>

<input id="name" placeholder="Name">
<input id="email" placeholder="E-Mail">

<button class="btn btn-primary" style="width:100%;margin-top:15px;" onclick="login()">Start</button>
</div>
</div>

<!-- HEADER -->
<header>
<div><b>Kreativlabor EGN</b></div>

<div style="display:flex;gap:10px;align-items:center;">
<div>⭐ <span id="points">0</span></div>
<button class="btn btn-secondary" onclick="openAdmin()">Admin</button>
</div>
</header>

<div class="container">

<!-- NAV -->
<div style="display:flex;gap:10px;margin-bottom:15px;">
<button class="btn btn-secondary" onclick="tab('order')">Aufträge</button>
<button class="btn btn-secondary" onclick="tab('db')">Datenbank</button>
<button id="adminTab" class="btn btn-secondary hidden" onclick="tab('admin')">Admin Panel</button>
</div>

<!-- ORDER -->
<div id="order">

<div class="card">
<h3>Idee / Reparatur</h3>

<div class="grid">
<div>
<label>Name</label>
<input id="idea_name">
</div>
<div>
<label>Klasse</label>
<input id="idea_class">
</div>
</div>

<label>Build / Skizze</label>
<input id="idea_sketch" placeholder="Optional">

<label>Beschreibung</label>
<textarea id="idea_desc"></textarea>

<button class="btn btn-primary" onclick="addIdea()">Senden</button>
</div>

<div class="card">
<h3>STL Druck</h3>

<div class="grid">
<div>
<label>Name</label>
<input id="stl_name">
</div>

<div>
<label>Material</label>
<select id="material">
<option>PLA</option>
<option>PETG</option>
<option>ABS</option>
</select>
</div>
</div>

<label>Datei</label>
<input type="file" id="file">

<label>Punkte nutzen</label>
<select id="pointsMode">
<option value="none">Keine</option>
<option value="discount">10% Rabatt (50)</option>
<option value="free">Gratis (250)</option>
</select>

<label>Beschreibung</label>
<textarea id="stl_desc"></textarea>

<button class="btn btn-primary" onclick="addStl()">Senden</button>
</div>

<div class="card">
<h3>Aufträge</h3>
<div id="orders"></div>
</div>

</div>

<!-- DB -->
<div id="db" class="hidden">

<div class="card">
<h3>Modell Datenbank Upload</h3>

<input id="db_title" placeholder="Titel">
<textarea id="db_desc"></textarea>
<input type="file">

<button class="btn btn-primary" onclick="addModel()">Upload</button>
</div>

<div class="card">
<div id="models"></div>
</div>

</div>

<!-- ADMIN -->
<div id="admin" class="hidden">

<div class="card">
<h3>Admin Dashboard</h3>
<div id="admin_orders"></div>
</div>

</div>

</div>

<script>

let user={};
let orders=JSON.parse(localStorage.getItem("orders")||"[]");
let models=JSON.parse(localStorage.getItem("models")||"[]");
let points=parseInt(localStorage.getItem("points")||"0");

function save(){
localStorage.setItem("orders",JSON.stringify(orders));
localStorage.setItem("models",JSON.stringify(models));
localStorage.setItem("points",points);
}

function login(){
user.name=document.getElementById("name").value;
user.email=document.getElementById("email").value;
if(!user.name||!user.email)return alert("Fehler");
document.getElementById("login").style.display="none";
}

function tab(t){
document.getElementById("order").classList.add("hidden");
document.getElementById("db").classList.add("hidden");
document.getElementById("admin").classList.add("hidden");

document.getElementById(t).classList.remove("hidden");

render();
}

function addIdea(){
orders.unshift({
id:Date.now(),
type:"Idee",
status:"Eingegangen",
desc:document.getElementById("idea_desc").value
});
save();render();
}

function addStl(){

let price=5;

let mode=document.getElementById("pointsMode").value;

if(mode==="discount"&&points>=50){
points-=50;price*=0.9;
}
else if(mode==="free"&&points>=250){
points-=250;price=0;
}
else if(mode!=="none"){
alert("Nicht genug Punkte");return;
}

points+=10; // safe reward

orders.unshift({
id:Date.now(),
type:"STL",
status:"Eingegangen",
desc:document.getElementById("stl_desc").value,
price
});

save();render();
}

function addModel(){
models.unshift({
title:db_title.value,
desc:db_desc.value
});
points+=30;
save();render();
}

function openAdmin(){
let pw=prompt("Passwort");
if(pw==="kreativlabor2026"){
document.getElementById("adminTab").classList.remove("hidden");
alert("Admin OK");
}
}

function changeStatus(id,status){
orders=orders.map(o=>o.id===id?{...o,status}:o);
save();render();
}

function deleteOrder(id){
orders=orders.filter(o=>o.id!==id);
save();render();
}

function render(){

document.getElementById("points").innerText=points;

let html="";
orders.forEach(o=>{
html+=`
<div class="card">
<b>${o.type}</b>
<div class="status ${statusClass(o.status)}">${o.status}</div>
<p>${o.desc}</p>
${o.price?`<b>${o.price.toFixed(2)} €</b>`:""}

<button onclick="changeStatus(${o.id},'Heruntergeladen')">⬇</button>
<button onclick="changeStatus(${o.id},'Drucken')">🖨</button>
<button onclick="changeStatus(${o.id},'Fertig')">✔</button>
<button onclick="deleteOrder(${o.id})">🗑</button>
</div>`;
});

ordersDiv.innerHTML=html;

modelsDiv.innerHTML=models.map(m=>`
<div class="card">
<b>${m.title}</b>
<p>${m.desc}</p>
</div>
`).join("");

admin_orders.innerHTML=orders.map(o=>`
<div class="card">
<b>${o.type}</b>
<p>${o.desc}</p>
<button onclick="changeStatus(${o.id},'Heruntergeladen')">Download</button>
<button onclick="changeStatus(${o.id},'Drucken')">Print</button>
<button onclick="changeStatus(${o.id},'Fertig')">Done</button>
</div>
`).join("");
}

function statusClass(s){
if(s==="Eingegangen")return"s1";
if(s==="Heruntergeladen")return"s2";
if(s==="Drucken")return"s3";
if(s==="Fertig")return"s4";
return"s1";
}

render();

</script>

</body>
</html>
