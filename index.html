<!-- =========================
PROFESSIONELLER LOGIN SCREEN
========================= -->

<style>

#login-screen{
  position:fixed;
  inset:0;
  background:
  linear-gradient(
    135deg,
    #f5f7fa 0%,
    #eef2f7 100%
  );

  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;

  font-family:'DM Sans',sans-serif;
}

.login-wrapper{
  width:100%;
  max-width:520px;
  padding:40px;
}

.login-card{

  background:white;

  border:1px solid #e5e7eb;

  border-radius:24px;

  padding:42px;

  box-shadow:
  0 10px 30px rgba(0,0,0,0.06);

}

.login-logo{

  width:70px;
  height:70px;

  border-radius:18px;

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;

  font-size:1.8rem;
  font-weight:700;

  margin-bottom:26px;
}

.login-title{

  font-size:2rem;
  font-weight:700;

  letter-spacing:-0.04em;

  color:#111827;

  margin-bottom:10px;
}

.login-subtitle{

  color:#6b7280;

  line-height:1.6;

  margin-bottom:34px;

  font-size:1rem;
}

.login-form-group{
  margin-bottom:20px;
}

.login-form-group label{

  display:block;

  margin-bottom:8px;

  font-size:.9rem;

  font-weight:600;

  color:#111827;
}

.login-input{

  width:100%;

  height:56px;

  border:1px solid #d1d5db;

  border-radius:14px;

  padding:0 18px;

  font-size:1rem;

  background:#f9fafb;

  transition:all .18s ease;
}

.login-input:focus{

  outline:none;

  border-color:#2563eb;

  background:white;

  box-shadow:
  0 0 0 4px rgba(37,99,235,.12);
}

.login-btn{

  width:100%;

  height:58px;

  border:none;

  border-radius:16px;

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

  color:white;

  font-size:1rem;

  font-weight:700;

  cursor:pointer;

  transition:all .18s ease;

  margin-top:10px;
}

.login-btn:hover{

  transform:translateY(-1px);

  box-shadow:
  0 10px 24px rgba(37,99,235,.22);
}

.login-error{

  display:none;

  margin-top:18px;

  background:#fef2f2;

  border:1px solid #fecaca;

  color:#b91c1c;

  padding:14px;

  border-radius:12px;

  font-size:.9rem;
}

.login-footer{

  margin-top:26px;

  text-align:center;

  color:#9ca3af;

  font-size:.82rem;
}

</style>

<div id="login-screen">

  <div class="login-wrapper">

    <div class="login-card">

      <div class="login-logo">
        EGN
      </div>

      <div class="login-title">
        Kreativlabor Portal
      </div>

      <div class="login-subtitle">
        Melde dich an, um Druckaufträge,
        Modell-Uploads und Reparaturanfragen
        verwalten zu können.
      </div>

      <div class="login-form-group">
        <label>Vor- und Nachname</label>

        <input
        type="text"
        id="login-name"
        class="login-input"
        placeholder="Max Mustermann">
      </div>

      <div class="login-form-group">
        <label>Klasse / Kurs</label>

        <input
        type="text"
        id="login-class"
        class="login-input"
        placeholder="z.B. 10A">
      </div>

      <div class="login-form-group">
        <label>E-Mail-Adresse</label>

        <input
        type="email"
        id="login-email"
        class="login-input"
        placeholder="deine@email.de">
      </div>

      <button
      class="login-btn"
      onclick="loginUser()">

        Weiter zum Portal

      </button>

      <div
      id="login-error"
      class="login-error">
      </div>

      <div class="login-footer">
        Kreativlabor EGN · Professional Edition
      </div>

    </div>

  </div>

</div>

<script>

const USER_KEY = "egn_current_user";

function loginUser(){

  const name =
  document.getElementById(
    'login-name'
  ).value.trim();

  const clazz =
  document.getElementById(
    'login-class'
  ).value.trim();

  const email =
  document.getElementById(
    'login-email'
  ).value.trim();

  const err =
  document.getElementById(
    'login-error'
  );

  err.style.display = 'none';

  if(!name || !clazz || !email){

    err.innerText =
    "Bitte alle Felder ausfüllen.";

    err.style.display = 'block';

    return;
  }

  if(!email.includes('@')){

    err.innerText =
    "Bitte gib eine gültige E-Mail-Adresse ein.";

    err.style.display = 'block';

    return;
  }

  localStorage.setItem(
    USER_KEY,

    JSON.stringify({

      name,
      class: clazz,
      email

    })
  );

  document.getElementById(
    'login-screen'
  ).style.display = 'none';

  autofillUserData();

  showToast("Erfolgreich angemeldet.");
}

function autofillUserData(){

  const user =
  JSON.parse(
    localStorage.getItem(USER_KEY)
  );

  if(!user) return;

  [
    'idea-name',
    'stl-name'
  ].forEach(id=>{

    if(document.getElementById(id)){

      document.getElementById(id).value =
      user.name;
    }
  });

  [
    'idea-class',
    'stl-class'
  ].forEach(id=>{

    if(document.getElementById(id)){

      document.getElementById(id).value =
      user.class;
    }
  });

  [
    'idea-email',
    'stl-email'
  ].forEach(id=>{

    if(document.getElementById(id)){

      document.getElementById(id).value =
      user.email;
    }
  });
}

window.onload = ()=>{

  const user =
  localStorage.getItem(USER_KEY);

  if(user){

    document.getElementById(
      'login-screen'
    ).style.display = 'none';

    autofillUserData();
  }

  renderOrders();
  renderDB();
  updatePointsDisplay();
};

</script>
