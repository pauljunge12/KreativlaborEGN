<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kreativlabor EGN</title>

<style>
:root{
--bg:#f4f4f6;
--card:#fff;
--border:#ddd;
--accent:#2563eb;
--text:#111;
--muted:#666;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

header{
background:#fff;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:10;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:14px;
border:1px solid var(--border);
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:12px;
margin:8px 0 14px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.btn{background:var(--accent);color:#fff}
.btn2{background:#eee}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.hidden{display:none}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:999px;
font-size:12px;
background:#eee;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:900px){
.grid{grid-template-columns:1fr}
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" style="position:fixed;inset:0;background:#fff;display:flex;justify-content:center;align-items:center;z-index:9999;">
<div class="card" style="width:400px">
<h2>Kreativlabor EGN Login</h2>
<input id="loginName" placeholder="Name">
<input id="loginEmail" placeholder="E-Mail">
<button class="btn" onclick="login()">Starten</button>
</div>
</div>

<!-- HEADER -->
<header>
<div><b>Kreativlabor EGN</b></div>
<div>⭐ <span id="points">0</span> Punkte</div>
</header>

<div class="container">

<!-- NAV -->
<div class="tabs">
<button class="btn2" onclick="show('idea')">Idee / Reparatur</button>
<button class="btn2" onclick="show('stl')">STL Druck</button>
<button class="btn2" onclick="show('db')">Datenbank</button>
<button class="btn2 hidden" id="adminBtn" onclick="show('admin')">Admin</button>
</div>

<!-- ================= IDEA ================= -->
<div id="idea">

<div class="card">
<h2>Idee / Reparatur / Projekt</h2>

<div class="grid">

<div>
<input id="i_name" placeholder="Name">
<input id="i_class" placeholder="Klasse">
<input id="i_email" placeholder="E-Mail">
<input id="i_build" placeholder="Build / Skizze Beschreibung">
<input type="file" id="i_img">
</div>

<div>
<textarea id="i_desc" placeholder="Projektbeschreibung" rows="10"></textarea>
</div>

</div>

<button class="btn" onclick="sendIdea()">Absenden</button>
</div>

</div>

<!-- ================= STL ================= -->
<div id="stl" class="hidden">

<div class="card">
<h2>STL Druckauftrag</h2>

<div class="grid">

<div>
<input id="s_name" placeholder="Name">
<input id="s_class" placeholder="Klasse">

<select id="pointsMode">
<option value="none">Keine Punkte</option>
<option value="discount">10% Rabatt (50 Punkte)</option>
<option value="free">Freidruck (250 Punkte)</option>
</select>
</div>

<div>
<input type="file" id="stl_file">
<textarea id="s_desc" placeholder="Beschreibung"></textarea>
</div>

</div>

<div class="card">
Preis: <b id="price">10 €</b>
</div>

<button class="btn" onclick="sendStl()">Bestellen</button>
</div>

</div>

<!-- ================= DB ================= -->
<div id="db" class="hidden">

<div class="card">
<h2>Modell Datenbank</h2>

<input id="db_title" placeholder="Titel">
<input type="file" id="db_file">
<textarea id="db_desc"></textarea>

<button class="btn" onclick="uploadModel()">Upload</button>
</div>

<div id="db_list"></div>

</div>

<!-- ================= ADMIN ================= -->
<div id="admin" class="hidden">

<div class="card">
<h2>Admin Dashboard</h2>
<div id="admin_list"></div>
</div>

</div>

</div>

<script>

/* ================= DATA ================= */

let orders=[];
let models=[];
let points=0;

const ADMIN_PASS="kreativlabor2026";

/* ================= LOGIN ================= */

function login(){
document.getElementById("loginScreen").style.display="none";
}

/* ================= NAV ================= */

function show(tab){

["idea","stl","db","admin"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});

document.getElementById(tab).classList.remove("hidden");

if(tab==="admin")renderAdmin();
}

/* ================= STORAGE ================= */

function save(){
localStorage.setItem("orders",JSON.stringify(orders));
localStorage.setItem("models",JSON.stringify(models));
localStorage.setItem("points",points);
}

function load(){
orders=JSON.parse(localStorage.getItem("orders")||"[]");
models=JSON.parse(localStorage.getItem("models")||"[]");
points=parseInt(localStorage.getItem("points")||0);

updatePoints();
renderModels();
}
load();

/* ================= POINTS ================= */

function updatePoints(){
document.getElementById("points").innerText=points;
}

/* ================= IDEA ================= */

function sendIdea(){

orders.unshift({
type:"Idee",
name:document.getElementById("i_name").value,
class:document.getElementById("i_class").value,
desc:document.getElementById("i_desc").value,
build:document.getElementById("i_build").value,
img:document.getElementById("i_img").files[0]?.name||"",
status:"offen"
});

save();
alert("Idee gesendet");
}

/* ================= STL ================= */

function sendStl(){

let price=10;
let mode=document.getElementById("pointsMode").value;

if(mode==="discount"&&points>=50){
points-=50;
price=Math.round(price*0.9);
}

if(mode==="free"&&points>=250){
points-=250;
price=0;
}

if(points<0)points=0;

points+=10;

orders.unshift({
type:"STL",
name:document.getElementById("s_name").value,
class:document.getElementById("s_class").value,
desc:document.getElementById("s_desc").value,
file:document.getElementById("stl_file").files[0]?.name||"",
price:Math.round(price),
status:"offen"
});

save();
updatePoints();
alert("Bestellung gesendet");
}

/* ================= DB ================= */

function uploadModel(){

models.unshift({
title:document.getElementById("db_title").value,
desc:document.getElementById("db_desc").value,
file:document.getElementById("db_file").files[0]?.name||""
});

points+=25;

save();
updatePoints();
renderModels();

alert("Upload erfolgreich");
}

function renderModels(){

document.getElementById("db_list").innerHTML=

models.map(m=>`
<div class="card">
<b>${m.title}</b><br>
${m.desc}<br>
📁 ${m.file}
</div>
`).join('');
}

/* ================= ADMIN ================= */

function adminLogin(){

let pw=prompt("Admin Passwort");

if(pw===ADMIN_PASS){
document.getElementById("adminBtn").classList.remove("hidden");
show("admin");
renderAdmin();
}
}

function renderAdmin(){

document.getElementById("admin_list").innerHTML=

orders.map((o,i)=>`
<div class="card">

<b>${o.type}</b> (${o.name||""})

<br><br>

${o.desc}

<br><br>

📎 ${o.file||""}

<br><br>

<span class="badge">${o.status}</span>

<br><br>

<button class="btn" onclick="finish(${i})">Erledigt</button>

</div>
`).join('');
}

function finish(i){
orders.splice(i,1);
save();
renderAdmin();
}

</script>

</body>
</html>
